<!doctype html>
<html lang="uk">
<head>
    <link rel="icon" type="image/x-icon" href="/ui/assets/img/favicon.ico"/>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta http-equiv="refresh" content="60"/>

    <!-- Dynasty Design System CSS -->
    <link rel="stylesheet" href="/ui/assets/css/guard-ds.css">

    <title>Система заявок | ЖК Династія</title>
</head>
<body>
<!-- Navbar -->
<nav class="guard-navbar">
    <a href="/ui/guard" class="guard-brand">
        <img src="/ui/assets/img/logo.png" width="30" height="30" alt="ЖК Династія">
        <span>ЖК Династія</span>
    </a>
    <span class="guard-navbar__sub">Система заявок · КПП</span>
    <span class="guard-navbar__refresh">Оновлення кожні 60 с</span>
</nav>

<!-- Main Container -->
<div class="guard-container">
    <!-- Summary Strip -->
    <div class="guard-summary" id="guardSummary">
        <div class="guard-summary__stat">
            <span class="guard-summary__n guard-summary__n--open" id="summaryOpen">-</span>
            <span class="guard-summary__l">Відкритих</span>
        </div>
        <div class="guard-summary__divider"></div>
        <div class="guard-summary__stat">
            <span class="guard-summary__n" id="summaryClosed">-</span>
            <span class="guard-summary__l">Закритих</span>
        </div>
        <div class="guard-summary__divider"></div>
        <div class="guard-summary__stat">
            <span class="guard-summary__n" id="summaryTotal">-</span>
            <span class="guard-summary__l">Усього сьогодні</span>
        </div>
    </div>

    <!-- Filter Bar -->
    <div class="guard-filterbar">
        <div class="guard-pills">
            <button class="guard-pill itemsTypeFilter" data-value="kpp">Тільки для КПП</button>
            <button class="guard-pill itemsStatusFilter" data-value="new">Тільки відкриті</button>
        </div>
        <div class="guard-search">
            <div class="guard-input-group">
                <span class="guard-input-icon">
                    <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                        <path d="M13 13L9 9M1 5.5C1 6.95869 1.57946 8.35764 2.61091 9.38909C3.64236 10.4205 5.04131 11 6.5 11C7.95869 11 9.35764 10.4205 10.3891 9.38909C11.4205 8.35764 12 6.95869 12 5.5C12 4.04131 11.4205 2.64236 10.3891 1.61091C9.35764 0.579463 7.95869 0 6.5 0C5.04131 0 3.64236 0.579463 2.61091 1.61091C1.57946 2.64236 1 4.04131 1 5.5V5.5Z" stroke="currentColor" stroke-linecap="round"/>
                    </svg>
                </span>
                <input type="text" class="guard-input" placeholder="Квартира" id="searchByApt" maxlength="4">
                <button class="guard-input-clear" id="searchByAptBtn" style="display: none;">✕</button>
            </div>
        </div>
    </div>

    <!-- Request Table -->
    <div class="guard-table-wrap">
        <table class="guard-table">
            <tbody id="itemsTableBody">
                <!-- Rows inserted by JavaScript -->
            </tbody>
        </table>
    </div>

    <!-- Pager -->
    <div class="guard-pager" id="itemsPager" style="display: none;">
        <ul class="guard-pager__list"></ul>
    </div>
</div>

<!-- Photo Modal -->
<div class="guard-modal" id="guardModal">
    <div class="guard-modal__dialog">
        <button class="guard-modal__close" id="modalClose">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                <path d="M1 1L13 13M1 13L13 1" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
        </button>
        <div class="guard-modal__photo">
            <img class="guard-modal__img" id="modalImage" src="" alt=""/>
        </div>
    </div>
</div>

<!-- Toast Notification -->
<div class="guard-toast" id="guardToast"></div>

<script type="application/javascript" src="/ui/assets/js/jquery.js"></script>
<script type="application/javascript">
    const getQueryParams = (hash) => {
        let queryParams = {};
        let params = hash.split(';');
        for (let i = 0; i < params.length; i++) {
            let pair = params[i].split('=');
            queryParams[pair[0]] = decodeURIComponent(pair[1]);
        }
        return queryParams;
    };

    let pageURI = {{.PageURI}};
    let apiHost = {{.APIHost}};
    let reqType = {};
    let queryParams = getQueryParams(window.location.hash.substr(1));
    let currPage = typeof queryParams["page"] === "undefined" ? 1 : parseInt(queryParams["page"]);
    let limit = {{.PagerLimit}};
    let reqStatusFilter = !localStorage.getItem('reqStatus') ? 'new' : localStorage.getItem('reqStatus');
    let reqTypeFilter = !localStorage.getItem('reqType') ? 'kpp' : localStorage.getItem('reqType');

    $(document).ready(function () {
        loadRequestTypes();
        load24hStats();

        // Set active filter pills
        if (reqStatusFilter === 'new') {
            $('.itemsStatusFilter').addClass('is-active');
        }
        if (reqTypeFilter === 'kpp') {
            $('.itemsTypeFilter').addClass('is-active');
        }

        // Action button click handler
        $('#itemsTableBody').on('click', '.actionButton', function (e) {
            e.preventDefault();
            let id = $(this).attr('data-id');
            let status = $(this).attr('data-action');
            let endpoint = `${apiHost}/requests/v1/guard/request/${id}`;

            $.ajax({
                type: 'PUT',
                dataType: 'json',
                url: endpoint,
                data: `{"status":"${status}"}`
            }).done(function () {
                showToast(status === 'closed' ? 'Заявку закрито' : 'Заявку відкрито');
                setTimeout(() => window.location.reload(), 600);
            });
        });

        // Pager click handler
        $('#itemsPager').on('click', '.guard-pager__link', function () {
            if ($(this).parent().hasClass('is-active')) return;
            queryParams["page"] = $(this).attr('data-value');
            updateLocationHash();
            loadItems();
        });

        // Status filter toggle
        $('.itemsStatusFilter').on('click', function (e) {
            e.preventDefault();
            let newStatus = reqStatusFilter === 'new' ? 'all' : 'new';
            localStorage.setItem('reqStatus', newStatus);
            window.location = pageURI;
        });

        // Type filter toggle
        $('.itemsTypeFilter').on('click', function (e) {
            e.preventDefault();
            let newTypeFilter = reqTypeFilter === 'kpp' ? 'all' : 'kpp';
            localStorage.setItem('reqType', newTypeFilter);
            window.location = pageURI;
        });

        // Apartment search input
        let searchByAptInput = document.getElementById('searchByApt');
        searchByAptInput.value = !localStorage.getItem('apt') ? '' : localStorage.getItem('apt');

        // Show clear button if input has value
        if (searchByAptInput.value) {
            $('#searchByAptBtn').show();
        }

        searchByAptInput.addEventListener("keyup", event => {
            if (event.isComposing || event.keyCode === 229) return;

            let str = searchByAptInput.value;
            if (str.length > 4) {
                searchByAptInput.value = str.substring(0, 4);
                return;
            }

            // Show/hide clear button
            $('#searchByAptBtn').toggle(str.length > 0);

            localStorage.setItem('apt', str);
            queryParams['page'] = 1;
            updateLocationHash();
            loadItems();
        });

        // Clear search button
        document.getElementById('searchByAptBtn').addEventListener('click', ev => {
            document.getElementById('searchByApt').value = '';
            localStorage.setItem('apt', '');
            $('#searchByAptBtn').hide();
            queryParams['page'] = 1;
            updateLocationHash();
            loadItems();
        });

        // Image thumbnail click
        $('#itemsTableBody').on('click', '.guard-thumb', function (e) {
            e.preventDefault();
            let src = $(this).attr('data-full-img');
            $('#modalImage').attr('src', src);
            $('#guardModal').addClass('is-open');
        });

        // Modal close
        $('#modalClose, #guardModal').on('click', function (e) {
            if (e.target === this) {
                $('#guardModal').removeClass('is-open');
            }
        });

        loadItems();
    });

    function load24hStats() {
        let endpoint = `${apiHost}/requests/v1/guard/stats24h`;
        $.get(endpoint).done(function (data) {
            $('#summaryOpen').text(data.open);
            $('#summaryClosed').text(data.closed);
            $('#summaryTotal').text(data.total);
        }).fail(function () {
            $('#summaryOpen').text('0');
            $('#summaryClosed').text('0');
            $('#summaryTotal').text('0');
        });
    }

    function loadRequestTypes() {
        let endpoint = `${apiHost}/dictionary/v1/request-types`;
        $.get(endpoint).done(function (data) {
            reqType = data["data"];
        }).fail(function () {
            // Fallback types
            reqType = {
                1: {ua: "Гість", en: "Guest"},
                2: {ua: "Таксі", en: "Taxi"},
                3: {ua: "Доставка", en: "Delivery"},
                4: {ua: "37-Б Розвантаження", en: "Cargo"}
            };
        });
    }

    function loadItems() {
        reqStatusFilter = !localStorage.getItem('reqStatus') ? 'new' : localStorage.getItem('reqStatus');
        currPage = typeof queryParams["page"] === "undefined" ? 1 : parseInt(queryParams["page"]);

        let offset = (parseInt(currPage) - 1) * limit;
        let apt = !localStorage.getItem('apt') ? '' : localStorage.getItem('apt');
        let endpoint = `${apiHost}/requests/v1/guard/list?offset=${offset}&limit=${limit}&status=${reqStatusFilter}&place=${reqTypeFilter}&apartment=${apt}`;

        $.get(endpoint).done(function (data) {
            renderItems(data);
            renderPager(data.count);
        }).fail(function () {
            $('#itemsTableBody').html('<tr><td class="guard-empty">Помилка завантаження даних.</td></tr>');
        });
    }

    function renderItems(items) {
        let table = $('#itemsTableBody');
        table.empty();

        if (!items.data || items.data.length === 0) {
            table.append('<tr><td class="guard-empty">Немає заявок за обраними фільтрами.</td></tr>');
            return;
        }

        items.data.forEach(function (item) {
            let date = new Date(item.time * 1000);
            let dateStr = formatDate(date);
            let images = renderImages(item.images || []);
            let description = typeof item.description !== "undefined" && item.description ?
                `<div class="guard-row__desc">${item.description}</div>` : '';

            let statusChip = item.status === 'closed' ? '<span class="guard-row__status-closed">Закрито</span>' : '';
            let rowClass = item.status === 'closed' ? 'is-closed' : '';

            let badgeColor = getBadgeColor(item.rtype);
            let typeName = reqType[item.rtype] ? reqType[item.rtype]["ua"] : "Невідомо";

            table.append(`
                <tr class="${rowClass}">
                    <td class="guard-row__main">
                        <div class="guard-row__head">
                            <span class="guard-badge" style="background: ${badgeColor};">${typeName}</span>
                            <span class="guard-row__when">${dateStr}</span>
                            ${statusChip}
                        </div>
                        <div class="guard-row__addr">
                            <strong>${item.address} <span class="guard-row__apt">#${item.apartment}</span></strong>
                            <span class="guard-row__dim">${item.user_name} · ${item.phone}</span>
                        </div>
                        ${description}
                        ${images}
                    </td>
                    <td class="guard-row__actions">${actionButton(item.status, item.id)}</td>
                </tr>
            `);
        });
    }

    function formatDate(date) {
        let day = String(date.getDate()).padStart(2, '0');
        let month = String(date.getMonth() + 1).padStart(2, '0');
        let year = date.getFullYear();
        let hours = String(date.getHours()).padStart(2, '0');
        let minutes = String(date.getMinutes()).padStart(2, '0');
        return `${day}.${month}.${year}, ${hours}:${minutes}`;
    }

    function getBadgeColor(rtype) {
        const colors = {
            1: '#17A2B8',  // guest
            2: '#F0A500',  // taxi
            3: '#4A90A4',  // delivery
            4: '#C0392B'   // cargo
        };
        return colors[rtype] || '#6c757d';
    }

    function renderImages(images) {
        if (!images || images.length === 0) return '';

        let imgBlock = '<div class="guard-row__imgs">';
        images.forEach(function (item) {
            imgBlock += `
                <div class="guard-thumb" data-full-img="${item.img}">
                    <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                        <path d="M2.5 15L7.5 10L10 12.5L15 7.5M17.5 2.5H2.5V17.5H17.5V2.5Z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
            `;
        });
        imgBlock += '</div>';
        return imgBlock;
    }

    function actionButton(status, id) {
        if (status === "new") {
            return `<button type='button' class='guard-btn guard-btn--success actionButton' data-action='closed' data-id='${id}'>Закрити</button>`;
        } else {
            return `<button type='button' class='guard-btn guard-btn--secondary actionButton' data-action='new' data-id='${id}'>Відкрити</button>`;
        }
    }

    function renderPager(count) {
        let container = $("#itemsPager");
        let list = container.find('.guard-pager__list');
        list.empty();

        if (count <= limit) {
            container.hide();
            return;
        }

        container.show();
        let pagesTotal = Math.ceil(count / limit);

        for (let i = 1; i <= pagesTotal; i++) {
            list.append(renderPagerLink(i));
        }
    }

    function renderPagerLink(page) {
        let activeClass = page === currPage ? 'is-active' : '';
        return `
            <li class="guard-pager__item ${activeClass}">
                <a class="guard-pager__link" data-value="${page}">${page}</a>
            </li>
        `;
    }

    function updateLocationHash() {
        let parts = [];
        for (key in queryParams) {
            parts.push(key + '=' + queryParams[key]);
        }
        window.location.hash = '#' + parts.join(';');
    }

    function showToast(message) {
        let toast = $('#guardToast');
        toast.text(message).addClass('is-visible');
        setTimeout(() => toast.removeClass('is-visible'), 1800);
    }
</script>
</body>
</html>
