name: PR
on:
  pull_request:
    branches:
      - master
jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:

      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go 1.26.3
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.3'
          cache: true

      - name: Dependencies
        run: make deps

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v2.12.2

      - name: Test and Build image
        run: make build
