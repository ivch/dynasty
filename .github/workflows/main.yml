name: Master
on:
  push:
    branches:
      - master
jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:

      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go 1.26.3
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.3'
          cache: true

      - name: Dependencies
        run: make deps

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2

      - name: Test and Build image
        run: CODECOV_TOKEN=${{secrets.DYN_CODECOV_TOKEN}} make build

      - name: Tag and Push image
        run: |
          docker login -u ${{secrets.DYN_DOCKER_LOGIN}} -p ${{secrets.DYN_DOCKER_PASSWORD}}
          make push